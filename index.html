<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Senior Fullstack Engineer interview handbook." />
    <title>Senior Fullstack Interview Handbook</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/atom-one-dark.min.css" />
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #172033; background: #f7f8fc; }
      * { box-sizing: border-box; }
      body { margin: 0; }
      header { background: #101828; color: white; padding: 3.5rem 1.5rem 2.5rem; }
      header > div, main { max-width: 960px; margin: 0 auto; }
      header p { max-width: 720px; color: #d0d5dd; margin: .8rem 0 0; line-height: 1.6; }
      h1 { margin: 0; font-size: clamp(2rem, 6vw, 3.5rem); line-height: 1.08; letter-spacing: -.045em; }
      .handbook-version { display: inline-flex; align-items: center; gap: .4rem; margin: .75rem 0 1.75rem; padding: .3rem .65rem; border: 1px solid #b2ccff; border-radius: 999px; background: #eff4ff; color: #175cd3; font-size: .85rem; font-weight: 650; }
      .handbook-version code { background: transparent; padding: 0; color: inherit; }
      #language-controls-wrap { position: sticky; top: 0; z-index: 1; background: rgb(16 24 40 / 96%); box-shadow: 0 2px 12px rgb(16 24 40 / 18%); }
      #language-controls { display: flex; flex-wrap: wrap; gap: .75rem 1rem; max-width: 960px; margin: 0 auto; padding: .7rem 1.5rem; }
      #language-controls fieldset { display: flex; gap: 0; margin: 0; padding: 0; border: 1px solid #475467; border-radius: 999px; overflow: hidden; }
      #language-controls legend { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }
      #language-controls label { position: relative; display: inline-flex; align-items: center; color: #d0d5dd; cursor: pointer; }
      #language-controls label + label { border-left: 1px solid #475467; }
      #language-controls label span { padding: .4rem .8rem; font-size: .85rem; font-weight: 650; }
      #language-controls input { position: absolute; inline-size: 1px; block-size: 1px; opacity: 0; }
      #language-controls label:has(input:checked) { background: #175cd3; color: white; }
      #language-controls label:has(input:focus-visible) { outline: 2px solid #84adff; outline-offset: -2px; }
      #language-controls label:has(input:disabled) { color: #98a2b3; cursor: not-allowed; }
      #language-controls label:has(input:disabled):has(input:checked) { background: #344054; }
      main { background: white; margin-top: 2rem; margin-bottom: 4rem; padding: clamp(1.25rem, 4vw, 4rem); border-radius: 18px; box-shadow: 0 12px 30px rgb(16 24 40 / 8%); }
      h2 { margin-top: 3.5rem; padding-top: .6rem; border-top: 1px solid #e4e7ec; font-size: 1.7rem; }
      h3 { margin-top: 2.4rem; font-size: 1.3rem; }
      h4 { margin: 1.15rem 0 .35rem; font-size: 1rem; color: #344054; }
      p, li { line-height: 1.65; }
      a { color: #175cd3; }
      code { background: #f2f4f7; padding: .1rem .3rem; border-radius: 4px; }
      pre { overflow-x: auto; white-space: pre-wrap; overflow-wrap: anywhere; background: #101828; color: #f8fafc; padding: 1rem; border-radius: 8px; }
      pre code { white-space: pre-wrap; overflow-wrap: anywhere; background: transparent; padding: 0; }
      blockquote { margin: 1rem 0; padding: .2rem 1rem; border-left: 4px solid #84adff; color: #475467; }
      .table-scroll { overflow-x: auto; margin: 1.25rem 0; border: 1px solid #e4e7ec; border-radius: 8px; }
      .table-scroll table { width: min-content; min-width: 100%; margin: 0; border-collapse: collapse; }
      .table-scroll th, .table-scroll td { padding: .65rem .8rem; border: 1px solid #e4e7ec; text-align: left; vertical-align: top; }
      .table-scroll th { background: #f9fafb; }
      .mermaid { overflow-x: auto; margin: 1.25rem 0; padding: 1rem; border: 1px solid #e4e7ec; border-radius: 8px; background: #fff; text-align: center; }
      #reading-progress { position: fixed; right: 0; bottom: 0; left: 0; z-index: 2; height: 3px; background: rgb(23 92 211 / 12%); pointer-events: none; }
      #reading-progress-fill { width: 0; height: 100%; background: #175cd3; transition: width 120ms linear; }
      #status { color: #667085; }
      #toc { position: fixed; z-index: 2; top: 1.25rem; right: 1.25rem; width: 240px; max-height: calc(100vh - 2.5rem); overflow: auto; padding: 1rem; border: 1px solid #e4e7ec; border-radius: 12px; background: rgb(255 255 255 / 94%); box-shadow: 0 10px 24px rgb(16 24 40 / 10%); backdrop-filter: blur(10px); }
      #toc h2 { margin: 0 0 .65rem; padding: 0; border: 0; font-size: .78rem; letter-spacing: .08em; text-transform: uppercase; color: #667085; }
      #toc .toc-version { margin: -.35rem 0 .8rem; color: #667085; font-size: .75rem; }
      #toc ol { display: grid; gap: .25rem; margin: 0; padding: 0; list-style: none; }
      #toc a { display: block; padding: .28rem .4rem; border-radius: 5px; color: #475467; font-size: .85rem; line-height: 1.3; text-decoration: none; }
      #toc a:hover, #toc a[aria-current="true"] { color: #175cd3; background: #eff4ff; }
      #toc .toc-h3 { padding-left: 1rem; font-size: .8rem; }
      #mobile-actions { display: none; }
      #toc-toggle, #refresh, #to-top { display: none; }
      #refresh[hidden] { display: none !important; }
      @media (max-width: 1100px) {
        #toc { display: none; top: auto; right: .75rem; bottom: 4.25rem; width: min(320px, calc(100vw - 1.5rem)); max-height: 55vh; }
        #toc.toc-open { display: block; }
        #mobile-actions { display: flex; position: fixed; left: .75rem; right: .75rem; bottom: .75rem; z-index: 1; align-items: center; justify-content: center; }
        #mobile-actions button { display: block; padding: .65rem .9rem; border: 0; border-radius: calc(10rem); box-shadow: 0 8px 20px rgb(16 24 40 / 22%); font: inherit; font-weight: 650; }
        #toc-toggle { background: #175cd3; color: white; }
        #refresh, #to-top { --size: calc(1.5em * 2); padding: 0; width: var(--size); height: var(--size); }
        #refresh { position: absolute; left: .75rem; z-index: 1; background: #c33; color: white; }
        #to-top { position: absolute; right: .75rem; z-index: 1; background: white; color: #175cd3; }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Interview handbook</h1>
        <p>Senior Fullstack Engineer — multilingual technical interview preparation.</p>
      </div>
    </header>
    <div id="language-controls-wrap">
      <div id="language-controls" aria-label="Язык / Мова / Language">
          <fieldset id="base-language">
            <legend>Base language</legend>
            <label><input type="radio" name="base-language" value="ukr" /><span>UA</span></label>
            <label><input type="radio" name="base-language" value="eng" /><span>EN</span></label>
            <label><input type="radio" name="base-language" value="rus" /><span>RU</span></label>
          </fieldset>
          <fieldset id="additional-languages">
            <legend>Also show</legend>
            <label><input type="checkbox" value="ukr" /><span>UA</span></label>
            <label><input type="checkbox" value="eng" /><span>EN</span></label>
            <label><input type="checkbox" value="rus" /><span>RU</span></label>
          </fieldset>
        </div>
    </div>
    <aside id="toc" aria-label="Table of contents" hidden>
      <h2>On this page</h2>
      <p class="toc-version" id="toc-version"></p>
      <ol></ol>
    </aside>
    <div id="mobile-actions" hidden>
      <button id="toc-toggle" type="button" aria-controls="toc" aria-expanded="false">Содержание</button>
      <button id="refresh" type="button" aria-label="Доступна новая версия" title="Обновить handbook" hidden>↻</button>
      <button id="to-top" type="button" aria-label="Наверх" title="Наверх" hidden>↑</button>
    </div>
    <div id="reading-progress" role="progressbar" aria-label="Прочитано" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div id="reading-progress-fill"></div>
    </div>
    <main id="content"><p id="status">Loading handbook…</p></main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>
      if (window.mermaid) mermaid.initialize({ startOnLoad: false, securityLevel: "strict", theme: "neutral" });
      const languageSelectionKey = "handbook-language-selection";
      const legacyLanguageModeKey = "handbook-language-mode";
      const languageOrder = ["ukr", "eng", "rus"];
      const sourceLanguages = new Set(languageOrder);
      let activeLanguageSelection = { base: "rus", additional: ["eng"] };

      function normalizeLanguageSelection(selection) {
        const base = sourceLanguages.has(selection?.base) ? selection.base : "rus";
        const additional = [...new Set(selection?.additional ?? [])]
          .filter((language) => sourceLanguages.has(language) && language !== base)
          .sort((left, right) => languageOrder.indexOf(left) - languageOrder.indexOf(right));
        return { base, additional };
      }

      function legacySelection(mode) {
        const selections = {
          rus: { base: "rus", additional: [] },
          ukr: { base: "ukr", additional: [] },
          eng: { base: "eng", additional: [] },
          rueng: { base: "rus", additional: ["eng"] },
          ukreng: { base: "ukr", additional: ["eng"] },
        };
        return selections[mode];
      }

      function applyLanguageSelection(selection) {
        activeLanguageSelection = normalizeLanguageSelection(selection);
        const { base, additional } = activeLanguageSelection;
        document.body.dataset.baseLanguage = base;
        document.documentElement.lang = base === "eng" ? "en" : base === "ukr" ? "uk" : "ru";
        document.getElementById("toc-toggle").textContent =
          base === "eng" ? "Contents" : base === "ukr" ? "Зміст" : "Содержание";
        document.querySelectorAll("#base-language input").forEach((input) => {
          input.checked = input.value === base;
        });
        document.querySelectorAll("#additional-languages input").forEach((input) => {
          input.disabled = input.value === base;
          input.checked = input.value !== base && additional.includes(input.value);
        });
        try {
          localStorage.setItem(languageSelectionKey, JSON.stringify(activeLanguageSelection));
        } catch {
          // Storage may be disabled; the mode still applies for this visit.
        }
      }

      const scrollPositionKey = `handbook-scroll:${location.pathname}`;
      const navigationType = performance.getEntriesByType("navigation")[0]?.type;
      let loadedHandbookVersion;
      let tocObserver;
      let tocHandlersBound = false;
      const savedScrollPosition = (() => {
        try {
          return Number(sessionStorage.getItem(scrollPositionKey));
        } catch {
          return 0;
        }
      })();

      if ("scrollRestoration" in history) history.scrollRestoration = "manual";

      function saveScrollPosition() {
        try {
          sessionStorage.setItem(scrollPositionKey, String(window.scrollY));
        } catch {
          // Storage may be disabled; the handbook should still render normally.
        }
      }

      function updateReadingProgress() {
        const progress = document.getElementById("reading-progress");
        const maximumScroll = document.documentElement.scrollHeight - window.innerHeight;
        const percentage = maximumScroll <= 0 ? 100 : Math.round(Math.min(1, window.scrollY / maximumScroll) * 100);
        progress.setAttribute("aria-valuenow", String(percentage));
        document.getElementById("reading-progress-fill").style.width = `${percentage}%`;
      }

      function restoreScrollPosition() {
        if (location.hash && navigationType !== "reload") return;
        if (!Number.isFinite(savedScrollPosition) || savedScrollPosition <= 0) return;
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            window.scrollTo(0, savedScrollPosition);
            updateReadingProgress();
            setTimeout(() => {
              window.scrollTo(0, savedScrollPosition);
              updateReadingProgress();
            }, 100);
          });
        });
      }

      if ("onscrollend" in window) {
        document.addEventListener("scrollend", saveScrollPosition, { passive: true });
      } else {
        let scrollEndTimer;
        window.addEventListener("scroll", () => {
          clearTimeout(scrollEndTimer);
          scrollEndTimer = setTimeout(saveScrollPosition, 150);
        }, { passive: true });
      }
      window.addEventListener("pagehide", saveScrollPosition);
      window.addEventListener("beforeunload", saveScrollPosition);
      window.addEventListener("scroll", updateReadingProgress, { passive: true });
      window.addEventListener("resize", updateReadingProgress);
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") saveScrollPosition();
      });

      function slugify(value) {
        return value
          .toLowerCase()
          .normalize("NFKD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^\p{L}\p{N}]+/gu, "-")
          .replace(/^-|-$/g, "") || "section";
      }

      function buildToc() {
        const toc = document.getElementById("toc");
        const toggle = document.getElementById("toc-toggle");
        const mobileActions = document.getElementById("mobile-actions");
        const toTop = document.getElementById("to-top");
        const list = toc.querySelector("ol");
        const headings = [...document.querySelectorAll("#content h2, #content h3")];
        const usedIds = new Map();
        const visibleHeadings = [];

        list.replaceChildren();
        tocObserver?.disconnect();

        headings.forEach((heading) => {
          const base = slugify(heading.textContent);
          const count = usedIds.get(base) || 0;
          usedIds.set(base, count + 1);
          heading.id = count ? `${base}-${count + 1}` : base;

          // Headings hidden by the current language mode keep their ids but stay out of the TOC.
          if (!heading.getClientRects().length) return;
          visibleHeadings.push(heading);

          const item = document.createElement("li");
          const link = document.createElement("a");
          link.href = `#${heading.id}`;
          link.textContent = heading.textContent;
          if (heading.tagName === "H3") link.className = "toc-h3";
          item.append(link);
          list.append(item);
        });

        if (!visibleHeadings.length) return;
        toc.hidden = false;
        mobileActions.hidden = false;
        if (!tocHandlersBound) {
          toggle.addEventListener("click", () => {
            const isOpen = toc.classList.toggle("toc-open");
            toggle.setAttribute("aria-expanded", String(isOpen));
          });
          toTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
          document.addEventListener("click", (event) => {
            if (!toc.classList.contains("toc-open")) return;
            if (toc.contains(event.target) || toggle.contains(event.target)) return;
            toc.classList.remove("toc-open");
            toggle.setAttribute("aria-expanded", "false");
          });
          list.addEventListener("click", () => {
            toc.classList.remove("toc-open");
            toggle.setAttribute("aria-expanded", "false");
          });
          tocHandlersBound = true;
        }
        const links = new Map([...list.querySelectorAll("a")].map((link) => [link.hash.slice(1), link]));
        let activeHeadingId;
        tocObserver = new IntersectionObserver((entries) => {
          const current = entries.filter((entry) => entry.isIntersecting).sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
          if (!current) return;
          if (current.target.id === activeHeadingId) return;
          activeHeadingId = current.target.id;
          links.forEach((link) => link.removeAttribute("aria-current"));
          const activeLink = links.get(current.target.id);
          activeLink?.setAttribute("aria-current", "true");
          activeLink?.scrollIntoView({ block: "nearest" });
        }, { rootMargin: "-18% 0px -70%" });
        visibleHeadings.forEach((heading) => tocObserver.observe(heading));
      }

      function removeInlineToc() {
        const heading = [...document.querySelectorAll("#content h2")]
          .find((element) => element.textContent.trim() === "Содержание");
        if (!heading) return;
        let node = heading;
        // Stop at the next H2 or at a language region marker comment.
        while (node && (node === heading || (node.nodeType !== Node.COMMENT_NODE && node.tagName !== "H2"))) {
          const next = node.nextSibling;
          node.remove();
          node = next;
        }
      }

      function makeTablesScrollable() {
        document.querySelectorAll("#content table").forEach((table) => {
          const wrapper = document.createElement("div");
          wrapper.className = "table-scroll";
          table.before(wrapper);
          wrapper.append(table);
        });
      }

      async function renderMermaidDiagrams() {
        if (!window.mermaid) return;
        const diagrams = [];
        document.querySelectorAll("#content pre code.language-mermaid").forEach((block) => {
          const diagram = document.createElement("div");
          diagram.className = "mermaid";
          diagram.textContent = block.textContent;
          block.closest("pre").replaceWith(diagram);
          diagrams.push(diagram);
        });
        if (diagrams.length) await mermaid.run({ nodes: diagrams });
      }

      function showVersion(markdown) {
        const version = markdown.match(/data-version="([^"]+)"/)?.[1];
        if (!version) return;
        loadedHandbookVersion = version;
        document.querySelectorAll("#content .handbook-version").forEach((element) => element.remove());
        const title = document.querySelector("#content h1");
        if (title) {
          const badge = document.createElement("p");
          badge.className = "handbook-version";
          badge.textContent = version;
          title.after(badge);
        }
        document.getElementById("toc-version").textContent = version;
      }

      async function fetchSource(language, { fresh = false } = {}) {
        if (!sourceLanguages.has(language)) throw new Error(`Unknown handbook language: ${language}`);
        const suffix = fresh ? `?v=${Date.now()}` : "";
        const response = await fetch(`./handbook.${language}.md${suffix}`, { cache: fresh ? "no-store" : "default" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.text();
      }

      function splitHandbook(markdown) {
        const [intro, ...sections] = markdown.split(/(?=^## )/m);
        return {
          intro,
          sections: sections.map((section) => {
            const [preamble, ...terms] = section.split(/(?=^### )/m);
            const title = preamble.match(/^## (.+)$/m)?.[1] ?? "";
            return { preamble, title, terms };
          }),
        };
      }

      function splitTerm(term) {
        const match = term.match(/^(### .+?)(?:\n|$)([\s\S]*)$/);
        return match ? { heading: match[1], body: match[2] } : { heading: term, body: "" };
      }

      function withoutCode(body) {
        return body
          .replace(/```[\s\S]*?```/g, "")
          .replace(/^---\s*$/gm, "")
          .trim();
      }

      function codeBlocks(body) {
        return body.match(/```[\s\S]*?```/g) ?? [];
      }

      function mergeTerm(baseTerm, additionalTerms) {
        const base = splitTerm(baseTerm);
        const translations = additionalTerms.map(splitTerm);
        const code = codeBlocks(base.body);
        return [
          base.heading,
          withoutCode(base.body),
          ...code,
          ...translations.map((translation) => withoutCode(translation.body)),
        ].filter(Boolean).join("\n\n");
      }

      function combineHandbooks(baseMarkdown, additionalMarkdowns) {
        const base = splitHandbook(baseMarkdown);
        const additional = additionalMarkdowns.map(splitHandbook);
        const additionalSections = additional.map((handbook) =>
          new Map(handbook.sections.map((section) => [section.title, section])),
        );
        const result = [base.intro.trim()];

        base.sections.forEach((section) => {
          const additionalTerms = additionalSections.map((sections) => new Map(
            (sections.get(section.title)?.terms ?? []).map((term) => [splitTerm(term).heading.slice(4), term]),
          ));
          result.push(section.preamble.trim());
          section.terms.forEach((term) => {
            const key = splitTerm(term).heading.slice(4);
            result.push(mergeTerm(term, additionalTerms.map((terms) => terms.get(key)).filter(Boolean)));
          });
        });
        return result.filter(Boolean).join("\n\n");
      }

      async function markdownForSelection(selection, { fresh = false } = {}) {
        const normalized = normalizeLanguageSelection(selection);
        const handbooks = await Promise.all([
          fetchSource(normalized.base, { fresh }),
          ...normalized.additional.map((language) => fetchSource(language, { fresh })),
        ]);
        return normalized.additional.length ? combineHandbooks(handbooks[0], handbooks.slice(1)) : handbooks[0];
      }

      async function checkForUpdate() {
        if (!loadedHandbookVersion) return;
        try {
          const markdown = await markdownForSelection(activeLanguageSelection, { fresh: true });
          const availableVersion = markdown.match(/data-version="([^"]+)"/)?.[1];
          if (availableVersion && availableVersion !== loadedHandbookVersion) {
            document.getElementById("refresh").hidden = false;
          }
        } catch {
          // A transient network failure should not affect reading the current handbook.
        }
      }

      async function renderHandbook(markdown, { preservePosition = false } = {}) {
        const previousPosition = preservePosition ? window.scrollY : 0;
        document.getElementById("content").innerHTML = marked.parse(markdown, { gfm: true });
        removeInlineToc();
        makeTablesScrollable();
        await renderMermaidDiagrams();
        if (window.hljs) {
          const aliases = { ts: "typescript", tsx: "typescript", yml: "yaml", dockerfile: "dockerfile", sh: "bash" };
          document.querySelectorAll("#content pre code").forEach((block) => {
            const language = [...block.classList].find((name) => name.startsWith("language-"))?.slice(9);
            if (language && aliases[language]) {
              block.classList.remove(`language-${language}`);
              block.classList.add(`language-${aliases[language]}`);
            }
            try {
              hljs.highlightElement(block);
            } catch {
              // A malformed or unknown language marker should leave readable plain code.
            }
          });
        }
        showVersion(markdown);
        buildToc();
        if (preservePosition) {
          requestAnimationFrame(() => {
            window.scrollTo(0, previousPosition);
            updateReadingProgress();
          });
        } else {
          restoreScrollPosition();
          updateReadingProgress();
        }
      }

      async function refreshHandbook() {
        const button = document.getElementById("refresh");
        button.disabled = true;
        try {
          await renderHandbook(await markdownForSelection(activeLanguageSelection, { fresh: true }), { preservePosition: true });
          button.hidden = true;
        } finally {
          button.disabled = false;
        }
      }

      document.getElementById("refresh").addEventListener("click", () => {
        refreshHandbook().catch(() => {
          // Keep the update button visible so the reader can retry.
        });
      });
      (() => {
        let savedSelection;
        try {
          const stored = localStorage.getItem(languageSelectionKey);
          savedSelection = stored && JSON.parse(stored);
          if (!savedSelection) savedSelection = legacySelection(localStorage.getItem(legacyLanguageModeKey));
        } catch {
          // Storage may be disabled; fall back to the default mode.
        }
        applyLanguageSelection(savedSelection);
      })();

      async function changeLanguageSelection(nextSelection) {
        const next = normalizeLanguageSelection(nextSelection);
        if (JSON.stringify(next) === JSON.stringify(activeLanguageSelection)) return;
        applyLanguageSelection(next);
        try {
          await renderHandbook(await markdownForSelection(next), { preservePosition: true });
          document.getElementById("refresh").hidden = true;
          checkForUpdate();
        } catch (error) {
          document.getElementById("status").textContent = `Unable to load handbook: ${error.message}`;
        }
      }

      document.querySelectorAll("#base-language input").forEach((input) => {
        input.addEventListener("change", () => {
          if (!input.checked) return;
          changeLanguageSelection({
            base: input.value,
            additional: activeLanguageSelection.additional,
          });
        });
      });
      document.querySelectorAll("#additional-languages input").forEach((input) => {
        input.addEventListener("change", () => {
          const additional = new Set(activeLanguageSelection.additional);
          if (input.checked) additional.add(input.value);
          else additional.delete(input.value);
          changeLanguageSelection({ base: activeLanguageSelection.base, additional: [...additional] });
        });
      });
      setInterval(checkForUpdate, 60_000);
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") checkForUpdate();
      });

      markdownForSelection(activeLanguageSelection)
        .then(async (markdown) => {
          saveScrollPosition();
          await renderHandbook(markdown);
          checkForUpdate();
        })
        .catch((error) => {
          document.getElementById("status").textContent = `Unable to load handbook: ${error.message}`;
        });
    </script>
